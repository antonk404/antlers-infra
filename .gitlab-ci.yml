stages:
  - validate
  - deploy

variables:
  ANSIBLE_HOST_KEY_CHECKING: "False"
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_CONFIG: "ansible/ansible.cfg"

# linter
validate:
  stage: validate
  tags:
    - infra
  script:
    - ansible-playbook ansible/playbooks/hub.yml --syntax-check
    - ansible-playbook ansible/playbooks/gate.yml --syntax-check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'


deploy:k8s:
  stage: deploy
  tags:
    - infra
  environment:
    name: production/k8s
  script:
    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
    - kubectl --kubeconfig=/tmp/kubeconfig apply -f k8s/
  after_script:
    - rm -f /tmp/kubeconfig
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - k8s/**

deploy:hub:
  stage: deploy
  tags:
    - infra
  environment:
    name: production/hub
  script:
    - echo "$ANSIBLE_VAULT_PASS" > /tmp/.vault_pass
    - ansible-playbook ansible/playbooks/hub.yml --vault-password-file /tmp/.vault_pass
  after_script:
    - rm -f /tmp/.vault_pass
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - ansible/roles/nginx/**
        - ansible/roles/amneziawg/**
        - ansible/playbooks/hub.yml

deploy:gate:
  stage: deploy
  tags:
    - infra
  environment:
    name: production/gate
  script:
    - echo "$ANSIBLE_VAULT_PASS" > /tmp/.vault_pass
    - ansible-playbook ansible/playbooks/gate.yml --vault-password-file /tmp/.vault_pass
  after_script:
    - rm -f /tmp/.vault_pass
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - ansible/roles/amneziawg/**
        - ansible/playbooks/gate.yml