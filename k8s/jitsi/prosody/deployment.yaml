apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-prosody
  namespace: antlers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-prosody
  template:
    metadata:
      labels:
        app: jitsi-prosody
    spec:
      nodeSelector:
        role: hub
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: prosody
          image: jitsi/prosody:stable-9584
          env:
            - name: AUTH_TYPE
              value: internal
            - name: ENABLE_AUTH
              value: "0"
            - name: ENABLE_GUESTS
              value: "1"
            - name: XMPP_DOMAIN
              value: meet.jitsi
            - name: XMPP_AUTH_DOMAIN
              value: auth.meet.jitsi
            - name: XMPP_MUC_DOMAIN
              value: muc.meet.jitsi
            - name: XMPP_INTERNAL_MUC_DOMAIN
              value: internal-muc.meet.jitsi
            - name: JICOFO_AUTH_USER
              value: focus
            - name: JVB_AUTH_USER
              value: jvb
            - name: TZ
              value: Europe/Moscow
            - name: JICOFO_COMPONENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jitsi-secret
                  key: jicofo-component-secret
            - name: JICOFO_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secret
                  key: jicofo-auth-password
            - name: JVB_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secret
                  key: jvb-auth-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: plugins
              mountPath: /prosody-plugins-custom
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jitsi-prosody-config
        - name: plugins
          emptyDir: {}
