apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-web
  namespace: antlers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-web
  template:
    metadata:
      labels:
        app: jitsi-web
    spec:
      nodeSelector:
        role: hub
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: web
          image: jitsi/web:stable-9584
          env:
            - name: ENABLE_AUTH
              value: "0"
            - name: ENABLE_GUESTS
              value: "1"
            - name: ENABLE_LETSENCRYPT
              value: "0"
            - name: ENABLE_HTTP_REDIRECT
              value: "0"
            - name: ENABLE_TRANSCRIPTIONS
              value: "0"
            - name: DISABLE_HTTPS
              value: "0"
            - name: JICOFO_AUTH_USER
              value: focus
            - name: XMPP_DOMAIN
              value: meet.jitsi
            - name: XMPP_AUTH_DOMAIN
              value: auth.meet.jitsi
            - name: XMPP_BOSH_URL_BASE
              value: http://prosody:5280
            - name: XMPP_MUC_DOMAIN
              value: muc.meet.jitsi
            - name: PUBLIC_URL
              value: https://30.0.0.1:8443
            - name: TZ
              value: Europe/Moscow
          ports:
            - containerPort: 443
              hostPort: 8443
              protocol: TCP
            - containerPort: 80
              hostPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          emptyDir: {}
