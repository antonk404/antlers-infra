apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: antlers
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'nodes'
        static_configs:
          - targets:
              - '30.0.0.1:9100'
            labels:
              alias: 'Happy Faraday (de)'
              env: 'prod'
          - targets:
              - '30.0.0.3:9100'
            labels:
              alias: 'Hungry Kapitsa (ru)'
              env: 'prod'