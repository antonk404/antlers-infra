- name: Ensure support directory exists
  file:
    path: /opt/services/support
    state: directory
    mode: '0755'

- name: Get support secrets from Vault
  community.hashi_vault.vault_kv2_get:
    url: "http://30.0.0.1:8200"
    path: "services/support"
    engine_mount_point: infra
    token: "{{ lookup('env', 'VAULT_TOKEN') }}"
  register: support_secrets
  delegate_to: localhost

- name: Deploy docker-compose with injected secrets
  copy:
    content: "{{ lookup('file', role_path + '/files/docker-compose.yaml')
      | regex_replace('BOT_TOKEN: VAULT_MANAGED', 'BOT_TOKEN: ' + support_secrets.secret.bot_token)
      | regex_replace('VAULT_MANAGED_DB_PASSWORD', support_secrets.secret.db_password) }}"
    dest: /opt/services/support/docker-compose.yaml
    mode: '0600'
  notify: restart support

- name: Start support
  community.docker.docker_compose_v2:
    project_src: /opt/services/support
    state: present
