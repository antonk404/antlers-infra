- name: Ensure matrix directories exist
  file:
    path: "/opt/services/matrix/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - element-config
    - synapse-data

- name: Get matrix secrets from Vault
  community.hashi_vault.vault_kv2_get:
    url: "http://30.0.0.1:8200"
    path: "services/matrix"
    engine_mount_point: infra
    token: "{{ lookup('env', 'VAULT_TOKEN') }}"
  register: matrix_secrets
  delegate_to: localhost

- name: Deploy docker-compose with injected secrets
  copy:
    content: "{{ lookup('file', role_path + '/files/docker-compose.yaml')
      | regex_replace('POSTGRES_PASSWORD: VAULT_MANAGED', 'POSTGRES_PASSWORD: ' + matrix_secrets.secret.postgres_password) }}"
    dest: /opt/services/matrix/docker-compose.yaml
    mode: '0600'
  notify: restart matrix

- name: Deploy homeserver.yaml with injected secrets
  copy:
    content: "{{ lookup('file', role_path + '/files/homeserver.yaml')
      | regex_replace('VAULT_MANAGED_POSTGRES_PASSWORD', matrix_secrets.secret.postgres_password)
      | regex_replace('VAULT_MANAGED_REGISTRATION_SECRET', matrix_secrets.secret.registration_shared_secret)
      | regex_replace('VAULT_MANAGED_MACAROON_KEY', matrix_secrets.secret.macaroon_secret_key)
      | regex_replace('VAULT_MANAGED_FORM_SECRET', matrix_secrets.secret.form_secret) }}"
    dest: /opt/services/matrix/synapse-data/homeserver.yaml
    mode: '0600'
  notify: restart matrix

- name: Copy element config
  copy:
    src: element-config/config.json
    dest: /opt/services/matrix/element-config/config.json
    mode: '0644'
  notify: restart matrix

- name: Start matrix
  community.docker.docker_compose_v2:
    project_src: /opt/services/matrix
    state: present
