- name: Ensure monitoring network exists
  community.docker.docker_network:
    name: monitoring
    state: present

- name: Ensure monitoring/node-exporter directory exists
  file:
    path: /opt/services/monitoring/node-exporter
    state: directory
    mode: '0755'

- name: Copy docker-compose
  copy:
    src: "{{ 'docker-compose.gate.yaml' if 'gate' in group_names else 'docker-compose.yaml' }}"
    dest: /opt/services/monitoring/node-exporter/docker-compose.yaml
    mode: '0644'
  notify: restart node-exporter

- name: Start node-exporter
  community.docker.docker_compose_v2:
    project_src: /opt/services/monitoring/node-exporter
    state: present
