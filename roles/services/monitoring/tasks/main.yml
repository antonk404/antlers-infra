- name: Ensure monitoring directory exists
  file:
    path: /opt/services/monitoring
    state: directory
    mode: '0755'

- name: Copy docker-compose
  copy:
    src: docker-compose.yaml
    dest: /opt/services/monitoring/docker-compose.yaml
    mode: '0644'
  notify: restart monitoring

- name: Copy prometheus config
  copy:
    src: prometheus.yaml
    dest: /opt/services/monitoring/prometheus.yaml
    mode: '0644'
  notify: restart monitoring

- name: Start monitoring
  community.docker.docker_compose_v2:
    project_src: /opt/services/monitoring
    state: present
