- name: Ensure monitoring/prometheus exists
  file:
    path: /opt/services/monitoring/prometheus
    state: directory
    mode: '0755'

- name: Copy docker-compose
  copy:
    src: docker-compose.yaml
    dest: /opt/services/monitoring/prometheus/docker-compose.yaml
    mode: '0644'
  notify: restart prometheus

- name: Copy prometheus configuration
  copy:
    src: prometheus.yaml
    dest: /opt/services/monitoring/prometheus/prometheus.yaml
    mode: '0644'
  notify: restart prometheus

- name: Start prometheus
  community.docker.docker_compose_v2:
    project_src: /opt/services/monitoring/prometheus
    state: present
