global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nodes'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          alias: 'Happy Faraday (de)'
          env: 'prod'
      - targets:
          - '10.2.0.1:9100'
        labels:
          alias: 'Hungry Kapitsa (ru)'
          env: 'prod'
