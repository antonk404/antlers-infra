- name: Fetch WG/AWG configs from servers
  hosts: all
  gather_facts: false

  tasks:
    - name: Find all WG/AWG conf files on server
      find:
        paths: /etc/amnezia/amneziawg
        patterns: "*.conf"
      register: remote_conf_files

    - name: Read each conf file
      slurp:
        src: "{{ item.path }}"
      register: conf_contents
      loop: "{{ remote_conf_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Save redacted configs locally
      copy:
        content: "{{ item.content | b64decode | regex_replace('(?m)^PrivateKey = (?!VAULT_MANAGED).*$', 'PrivateKey = VAULT_MANAGED') }}"
        dest: "{{ playbook_dir }}/../roles/amneziawg/files/{{ group_names | difference(['all']) | first }}/{{ inventory_hostname }}/{{ item.item.path | basename }}"
      delegate_to: localhost
      loop: "{{ conf_contents.results }}"
      loop_control:
        label: "{{ item.item.path | basename }}"
