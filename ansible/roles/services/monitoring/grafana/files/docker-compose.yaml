services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=VAULT_MANAGED
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "30.0.0.1:3000:3000"
    networks:
      - monitoring
volumes:
  grafana_data:
networks:
  monitoring:
    external: true 
